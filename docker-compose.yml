services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,Z
    restart: unless-stopped

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: ${INFLUXDB_DB}
      INFLUXDB_ADMIN_USER: ${INFLUXDB_ADMIN_USER}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD}
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
    volumes:
      - influxdb_data:/var/lib/influxdb
    restart: unless-stopped

  telegraf:
    image: telegraf:1.29
    container_name: telegraf
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - INFLUXDB_DB=${INFLUXDB_DB}
      - INFLUXDB_ADMIN_USER=${INFLUXDB_ADMIN_USER}
      - INFLUXDB_ADMIN_PASSWORD=${INFLUXDB_ADMIN_PASSWORD}
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro,Z
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    depends_on:
      - influxdb
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana  
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro,Z
    restart: unless-stopped

  producer:
    build: ./producer
    container_name: producer
    depends_on:
      - mosquitto
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      MQTT_BASE_TOPIC: "f1/monza"
      REPLAY_SPEEDUP: "2.0"
      SESSION_KEY: ${SESSION_KEY}
      DRIVER_NUMBERS: "16,55"
    volumes:
      - ./producer/cache:/app/cache:Z
    restart: "no"

  track:
    image: nginx:alpine
    container_name: track
    ports:
      - "8080:80"
    volumes:
      - ./track:/usr/share/nginx/html:ro,Z
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data: