[agent]
  interval = "1s"
  round_interval = true
  flush_interval = "1s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  quiet = false

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "f1"
  username = "admin"
  password = "adminpass"
  insecure_skip_verify = true

[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["f1/monza/#"]
  qos = 0

  data_format = "json"
  tag_keys = ["driver","year","session","measurement"]

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "f1/monza/+/+/+/+"
    measurement = "_/_/_/_/measurement"
    tags = "_/year/session/driver/_"

  topic_tag = ""

  json_time_key = "ts"
  json_time_format = "2006-01-02T15:04:05.999Z07:00"